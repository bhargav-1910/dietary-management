<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | Clinical Sanctuary</title>

        darkMode: "class",

          extend: {

              "tertiary": "#7f5300",

              "primary-fixed": "#d4e3ff",

              "error": "#ba1a1a",

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
      }
      .login-gradient {
        background: linear-gradient(135deg, #005da7 0%, #2976c7 100%);
      }
    </style>
</head>
<body class="bg-surface font-body text-on-surface flex items-center justify-center min-h-screen p-4 overflow-hidden">
<!-- Background Decorative Elements -->
<div class="fixed inset-0 z-0 pointer-events-none">
<div class="absolute top-[-10%] right-[-10%] w-[40vw] h-[40vw] rounded-full bg-primary/5 blur-3xl"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[30vw] h-[30vw] rounded-full bg-secondary/5 blur-3xl"></div>
</div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-[440px]">
<!-- Brand Header (Outside card for elegance) -->
<div class="flex flex-col items-center mb-8 gap-2">
<div class="w-12 h-12 flex items-center justify-center bg-primary rounded-xl mb-2 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary text-2xl" data-icon="medical_services">medical_services</span>
</div>
<h1 class="font-headline text-2xl font-extrabold tracking-tight text-on-background">Clinical Sanctuary</h1>
<p class="text-on-surface-variant font-medium text-sm">Dietary Management Portal</p>
</div>
<!-- Main Login Card -->
<section class="bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_-2px_rgba(25,28,29,0.04)] p-8 md:p-10 border border-outline-variant/10">
<header class="mb-8">
<h2 class="font-headline text-xl font-bold text-on-background">Welcome back</h2>
<p class="text-on-surface-variant text-sm mt-1">Please enter your credentials to continue</p>
</header>
<form class="space-y-6">
<!-- Username Field -->
<div class="space-y-2">
<label class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1" for="username">Username</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant text-xl" data-icon="person">person</span>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-low border-none rounded-xl text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all" id="username" name="username" placeholder="dr.jthorne" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant" for="password">Password</label>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant text-xl" data-icon="lock">lock</span>
<input class="w-full h-14 pl-12 pr-12 bg-surface-container-low border-none rounded-xl text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end">
<a class="text-sm font-medium text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<!-- Action Buttons -->
<div class="pt-2">
<button class="w-full h-14 login-gradient text-on-primary rounded-full font-headline font-bold text-base shadow-lg shadow-primary/30 active:scale-95 transition-all flex items-center justify-center gap-2" type="submit">
                        Login
                        <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<footer class="mt-8 pt-8 border-t border-outline-variant/20">
<div class="flex items-center justify-center gap-4">
<p class="text-xs text-on-surface-variant">Need assistance?</p>
<button class="bg-surface-container-high px-4 py-2 rounded-full text-xs font-bold text-on-primary-fixed-variant hover:bg-surface-container-highest transition-colors">Contact Support</button>
</div>
</footer>
</section>
<!-- Aesthetic Footer -->
<div class="mt-8 text-center px-4">
<p class="text-[10px] leading-relaxed text-outline uppercase tracking-[0.2em]">
                Authorized Personnel Only • HIPAA Compliant Environment
            </p>
</div>
</main>
<!-- Visual Identity Image (Bottom Right) -->
<div class="hidden lg:block fixed bottom-12 right-12 w-64 h-64 opacity-20 pointer-events-none">
<img alt="Clinic Abstract Logo" class="w-full h-full grayscale brightness-50" data-alt="Minimalist abstract medical icon representing sanctuary and health, smooth geometric lines in a soft blue and grey aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCDMvnXTphE4hxLrzmirtmhMIViGxYM8NKJCxG6EM78HTn-Mh7bPc76smLXkbvJDmdwrFuxB1D54-YTt7vdIJ6xeKj91srnEfSDYj_iyF4MA4MHs-VPdRoS8wjh1sg9SmRNKe_fCIf-3QEo9NdK-t7i6eA_aiqzIj3kMXR96tCnPyQJBU1__ZuKVmh5Q5AOxojRbiRkpW2ThkevJYKG33kB1S2qr4wPg5R1LCSACKTlFjHmb0LcLIqHJC1Ltz1We-6x3yszMGgu0ITs"/>
</div>
</body></html>
